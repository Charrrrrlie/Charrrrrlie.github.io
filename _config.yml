about_content: | # this will include new lines to allow paragraphs
  (updated on 2021.11.11)

  Hello there! My name's <mark>Yuchen Yang</mark> or you can call me Charles, Charrrrrlie (with a long drawl, as the unique site).

  I'm currently a Ph.D. candidate who will study further at Fudan University and Shanghai AI Lab in a co-supervised project.
  
  What I'm going to explore is Computer Vision, especially Perceptron in Autonomous Driving.
  
  Before that, I studied at Wuhan University and focused on (Remote Sensing) Image Compression and Restoration in the Lab. of Intelligent Information Processing, supervised by [Prof.ZhenZhong Chen](https://scholar.google.com/citations?user=w_BcpK8AAAAJ&hl=en)
  
  To know more about my non-academic interests, you can scroll down and read the list at the bottom.

